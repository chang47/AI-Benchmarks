<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Pelican riding a bicycle — hand-authored vector scene, static, self-contained -->

  <!-- ======================= backdrop ======================= -->
  <rect x="0" y="0" width="800" height="600" fill="#dff0fa"/>
  <!-- clouds -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="120" cy="80" rx="46" ry="18"/>
    <ellipse cx="158" cy="70" rx="34" ry="15"/>
    <ellipse cx="660" cy="60" rx="52" ry="19"/>
    <ellipse cx="700" cy="72" rx="36" ry="14"/>
  </g>
  <!-- ground -->
  <rect x="0" y="546" width="800" height="54" fill="#cde3bd"/>
  <line x1="0" y1="546" x2="800" y2="546" stroke="#9fbb8a" stroke-width="3"/>

  <!-- ======================= far-side leg (behind the bike) ======================= -->
  <g stroke="#b06a1e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 368 272 L 390 340 L 366 410"/>
  </g>
  <path d="M 366 410 L 392 404 L 374 420 Z" fill="#b06a1e"/>
  <!-- far crank + far pedal (behind frame, muted) -->
  <line x1="400" y1="460" x2="364" y2="414" stroke="#666666" stroke-width="6" stroke-linecap="round"/>
  <rect x="346" y="409" width="34" height="9" rx="3" fill="#555555"/>

  <!-- ======================= bicycle ======================= -->
  <!-- rear wheel -->
  <g>
    <circle cx="250" cy="450" r="95" fill="none" stroke="#2b2b2b" stroke-width="10"/>
    <circle cx="250" cy="450" r="84" fill="none" stroke="#999999" stroke-width="3"/>
    <g stroke="#aaaaaa" stroke-width="2.5">
      <line x1="250" y1="366" x2="250" y2="534"/>
      <line x1="166" y1="450" x2="334" y2="450"/>
      <line x1="191" y1="391" x2="309" y2="509"/>
      <line x1="191" y1="509" x2="309" y2="391"/>
    </g>
    <circle cx="250" cy="450" r="8" fill="#444444"/>
  </g>
  <!-- front wheel -->
  <g>
    <circle cx="570" cy="450" r="95" fill="none" stroke="#2b2b2b" stroke-width="10"/>
    <circle cx="570" cy="450" r="84" fill="none" stroke="#999999" stroke-width="3"/>
    <g stroke="#aaaaaa" stroke-width="2.5">
      <line x1="570" y1="366" x2="570" y2="534"/>
      <line x1="486" y1="450" x2="654" y2="450"/>
      <line x1="511" y1="391" x2="629" y2="509"/>
      <line x1="511" y1="509" x2="629" y2="391"/>
    </g>
    <circle cx="570" cy="450" r="8" fill="#444444"/>
  </g>

  <!-- frame (attaches to BOTH hubs) -->
  <g stroke="#d64545" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="250" y1="450" x2="400" y2="460"/>   <!-- chain stay: rear hub -> bottom bracket -->
    <line x1="250" y1="450" x2="361" y2="316"/>   <!-- seat stay: rear hub -> seat cluster -->
    <line x1="400" y1="460" x2="360" y2="310"/>   <!-- seat tube -->
    <line x1="400" y1="460" x2="528" y2="305"/>   <!-- down tube -->
    <line x1="362" y1="316" x2="528" y2="308"/>   <!-- top tube -->
    <line x1="530" y1="300" x2="570" y2="450"/>   <!-- fork: head tube -> front hub -->
  </g>
  <!-- head tube -->
  <line x1="522" y1="272" x2="536" y2="318" stroke="#d64545" stroke-width="12" stroke-linecap="round"/>

  <!-- drivetrain -->
  <circle cx="400" cy="460" r="20" fill="none" stroke="#444444" stroke-width="4"/>
  <circle cx="400" cy="460" r="6" fill="#333333"/>
  <!-- near crank + near pedal -->
  <line x1="400" y1="460" x2="438" y2="500" stroke="#333333" stroke-width="7" stroke-linecap="round"/>
  <rect x="420" y="496" width="36" height="9" rx="3" fill="#333333"/>

  <!-- seat post + saddle -->
  <line x1="360" y1="310" x2="354" y2="297" stroke="#333333" stroke-width="7" stroke-linecap="round"/>
  <path d="M 312 305 Q 352 288 392 299 Q 358 313 316 312 Z" fill="#333333"/>

  <!-- stem + handlebars -->
  <line x1="528" y1="300" x2="522" y2="264" stroke="#333333" stroke-width="8" stroke-linecap="round"/>
  <path d="M 522 264 C 542 250 564 258 558 286" fill="none" stroke="#333333" stroke-width="8" stroke-linecap="round"/>

  <!-- ======================= pelican ======================= -->
  <!-- tail -->
  <path d="M 316 232 L 266 204 L 298 254 Z" fill="#f2ecdd" stroke="#8a8a8a" stroke-width="2"/>
  <!-- body: sits on the saddle, between the wheels -->
  <ellipse cx="375" cy="250" rx="72" ry="48" fill="#fbf7ef" stroke="#8a8a8a" stroke-width="2.5"
           transform="rotate(-8 375 250)"/>
  <!-- neck (S-curve up to the head, leaning toward the handlebars) -->
  <path d="M 416 240 C 452 230 438 192 456 164" fill="none" stroke="#fbf7ef" stroke-width="24"
        stroke-linecap="round"/>
  <!-- head -->
  <circle cx="462" cy="150" r="26" fill="#fbf7ef" stroke="#8a8a8a" stroke-width="2.5"/>
  <!-- beak: long upper mandible + sagging pouch below (longer than the head) -->
  <path d="M 484 148 C 500 206 556 210 594 158 L 594 152 L 484 138 Z" fill="#f5a623"
        stroke="#c97b17" stroke-width="2"/>
  <path d="M 484 138 L 596 152 L 594 158 L 484 149 Z" fill="#e07b28"/>
  <!-- eye -->
  <circle cx="472" cy="141" r="4.5" fill="#222222"/>
  <circle cx="473.5" cy="139.5" r="1.4" fill="#ffffff"/>

  <!-- near-side leg (in front of the frame, reaching the near pedal) -->
  <path d="M 392 272 L 428 372 L 436 494" fill="none" stroke="#e8912d" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 436 494 L 464 490 L 446 506 Z" fill="#e8912d"/>

  <!-- wing sweeping forward to the handlebars -->
  <path d="M 392 222 C 452 206 514 226 556 276 C 510 262 448 244 396 246 Z"
        fill="#e8e2d4" stroke="#b3ab97" stroke-width="2.5"/>
</svg>
